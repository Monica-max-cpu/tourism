<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" width="100%" height="100%">
  
  <!-- 定义渐变、主题阴影及聚焦光晕 -->
  <defs>
    <!-- 背景渐变：微弱的暖粉蓝到冷灰蓝过渡，营造温润感 -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f7fb" />
      <stop offset="50%" stop-color="#f9fafd" />
      <stop offset="100%" stop-color="#f0f4f9" />
    </linearGradient>

    <!-- 提交按钮柔和渐变 -->
    <linearGradient id="btn-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a3c61" />
      <stop offset="100%" stop-color="#1A2C54" />
    </linearGradient>

    <!-- 超大模糊度、低不透明度的空气感阴影 -->
    <filter id="soft-shadow" x="-5%" y="-5%" width="110%" height="110%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1A2C54" flood-opacity="0.05" />
    </filter>

    <!-- 激活状态输入框的柔光蓝色发光效果 -->
    <filter id="focus-glow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#1A2C54" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- 页面背景 -->
  <rect x="0" y="0" width="1200" height="980" fill="url(#bg-gradient)" />

  <!-- ==================== 1. 左侧导航（品牌高亮无边界设计） ==================== -->
  <g transform="translate(0, 0)">
    <!-- 侧边背景 -->
    <rect x="0" y="0" width="220" height="980" fill="#ffffff" fill-opacity="0.95" />
    <line x1="220" y1="0" x2="220" y2="980" stroke="#eef2f6" stroke-width="1" />
    
    <!-- Logo -->
    <g transform="translate(24, 28)">
      <rect x="0" y="0" width="32" height="32" rx="10" fill="#1A2C54" />
      <path d="M12 11 Q16 7 20 11 T20 21" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
      <circle cx="16" cy="16" r="2" fill="#ffffff" />
      <text x="44" y="15" font-size="14" font-weight="bold" fill="#1e293b">山西文旅平台</text>
      <text x="44" y="27" font-size="8" fill="#94a3b8" letter-spacing="1">CULTURAL TOURISM</text>
    </g>

    <!-- 圆角菜单：使用品牌浅蓝色高亮 -->
    <g transform="translate(12, 90)">
      <rect x="0" y="0" width="196" height="40" rx="12" fill="#EFF6FF" />
      <rect x="0" y="12" width="4" height="16" rx="2" fill="#1A2C54" />
      <text x="44" y="25" font-size="13" font-weight="bold" fill="#1A2C54">平台商品目录</text>
    </g>
  </g>

  <!-- ==================== 2. 顶部面包屑 ==================== -->
  <g transform="translate(244, 20)">
    <text x="0" y="15" font-size="12" fill="#94a3b8">商品管理  /  <tspan fill="#1A2C54" font-weight="500">平台商品目录</tspan>  /  新建目录商品</text>
  </g>

  <!-- ==================== 3. 主内容区（居中流式卡片） ==================== -->
  <g transform="translate(350, 60)">
    
    <!-- 返回与标题 -->
    <g transform="translate(0, 15)">
      <text x="0" y="10" font-size="12" font-weight="bold" fill="#1A2C54" letter-spacing="0.5">←  返回商品目录</text>
      <text x="0" y="38" font-size="22" font-weight="bold" fill="#1e293b">新建目录商品</text>
      <text x="0" y="56" font-size="12" fill="#94a3b8">添加后即可上架，您可以随时在商品目录中编辑修改</text>
    </g>

    <!-- 主表单卡片 -->
    <g transform="translate(0, 85)" filter="url(#soft-shadow)">
      <!-- 白底大卡片 -->
      <rect x="0" y="0" width="700" height="760" rx="16" fill="#ffffff" />
      
      <!-- 卡片最顶部：品牌深蓝色装饰条 -->
      <path d="M 0,16 A 16,16 0 0,1 16,0 L 684,0 A 16,16 0 0,1 700,16 L 700,20 L 0,20 Z" fill="#1A2C54" />

      <!-- Section 1: 基础属性 -->
      <g transform="translate(32, 40)">
        <!-- 柔和的主题色图标底衬 -->
        <rect x="0" y="0" width="24" height="24" rx="6" fill="#EFF6FF" />
        <path d="M8 12 h8 M12 8 v8" fill="none" stroke="#1A2C54" stroke-width="1.8" stroke-linecap="round" />
        
        <text x="32" y="17" font-size="14" font-weight="bold" fill="#1e293b">基础属性</text>
        <line x1="0" y1="32" x2="636" y2="32" stroke="#f1f5f9" stroke-width="1" />

        <!-- 商品名称 (高亮聚焦状态演示) -->
        <g transform="translate(0, 48)">
          <text x="0" y="15" font-size="12" font-weight="bold" fill="#64748b">商品名称 <tspan fill="#ef4444">*</tspan></text>
          <!-- 获得焦点时的蓝色柔光边框 -->
          <rect x="0" y="24" width="636" height="38" rx="8" fill="#ffffff" stroke="#1A2C54" stroke-width="1.5" filter="url(#focus-glow)" />
          <text x="16" y="48" font-size="13" fill="#1e293b">山西老陈醋 (特级) 500ml</text>
          <!-- 闪烁的光标模拟 -->
          <line x1="172" y1="35" x2="172" y2="51" stroke="#1A2C54" stroke-width="1.5" />
        </g>

        <!-- 分类与单位 -->
        <g transform="translate(0, 126)">
          <text x="0" y="15" font-size="12" font-weight="bold" fill="#64748b">商品分类 <tspan fill="#ef4444">*</tspan></text>
          <rect x="0" y="24" width="308" height="38" rx="8" fill="#f8fafc" stroke="#f1f5f9" />
          <text x="16" y="48" font-size="13" fill="#475569">饮料 / 软饮</text>
          <path d="M284 41 L288 45 L292 41" fill="none" stroke="#1A2C54" stroke-width="1.8" stroke-linecap="round" />

          <text x="328" y="15" font-size="12" font-weight="bold" fill="#64748b">销售单位 <tspan fill="#ef4444">*</tspan></text>
          <rect x="328" y="24" width="308" height="38" rx="8" fill="#ffffff" stroke="#e2e8f0" />
          <text x="344" y="48" font-size="13" fill="#cbd5e1">例：箱、件、瓶</text>
        </g>
      </g>

      <!-- Section 2: 价格与起订 -->
      <g transform="translate(32, 248)">
        <rect x="0" y="0" width="24" height="24" rx="6" fill="#EFF6FF" />
        <!-- 钱币/价格图标 -->
        <circle cx="12" cy="12" r="5" fill="none" stroke="#1A2C54" stroke-width="1.5" />
        <line x1="12" y1="10" x2="12" y2="14" stroke="#1A2C54" stroke-width="1.5" />

        <text x="32" y="17" font-size="14" font-weight="bold" fill="#1e293b">价格策略与起订量</text>
        <line x1="0" y1="32" x2="636" y2="32" stroke="#f1f5f9" stroke-width="1" />

        <!-- 刊价与起订 -->
        <g transform="translate(0, 48)">
          <text x="0" y="15" font-size="12" font-weight="bold" fill="#64748b">起购刊价 (¥) <tspan fill="#ef4444">*</tspan></text>
          <rect x="0" y="24" width="308" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1" />
          <text x="16" y="48" font-size="13" fill="#1e293b" font-weight="500">26.00</text>

          <text x="328" y="15" font-size="12" font-weight="bold" fill="#64748b">最小起订数量 <tspan fill="#ef4444">*</tspan></text>
          <rect x="328" y="24" width="308" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1" />
          <text x="344" y="48" font-size="13" fill="#475569">1</text>
        </g>

        <!-- 阶梯价格（主题色边框和按钮） -->
        <g transform="translate(0, 126)">
          <text x="0" y="15" font-size="12" font-weight="bold" fill="#64748b">多档位阶梯价 (选填)</text>
          <rect x="0" y="24" width="636" height="56" rx="10" fill="#fbfcfd" stroke="#1A2C54" stroke-dasharray="4 3" stroke-opacity="0.3" />
          
          <g transform="translate(318, 52)">
            <text x="-40" y="5" font-size="12" fill="#94a3b8" text-anchor="middle">设置阶梯价可吸引大宗采购</text>
            <!-- 醒目的主题色按钮 -->
            <rect x="50" y="-12" width="80" height="24" rx="12" fill="#EFF6FF" />
            <text x="90" y="4" font-size="11" font-weight="bold" fill="#1A2C54" text-anchor="middle" style="cursor:pointer;">+ 添加阶梯</text>
          </g>
        </g>
      </g>

      <!-- Section 3: 媒体及描述 -->
      <g transform="translate(32, 476)">
        <rect x="0" y="0" width="24" height="24" rx="6" fill="#EFF6FF" />
        <!-- 图片小 icon -->
        <rect x="6" y="7" width="12" height="10" rx="1" fill="none" stroke="#1A2C54" stroke-width="1.5" />
        <circle cx="9" cy="10" r="1.2" fill="#1A2C54" />

        <text x="32" y="17" font-size="14" font-weight="bold" fill="#1e293b">媒体及描述信息</text>
        <line x1="0" y1="32" x2="636" y2="32" stroke="#f1f5f9" stroke-width="1" />

        <!-- 拖拽图片 + 文本描述 -->
        <g transform="translate(0, 48)">
          <!-- 左：天蓝色轻柔边框图片上传框 -->
          <rect x="0" y="0" width="160" height="110" rx="12" fill="#EFF6FF" fill-opacity="0.2" stroke="#1A2C54" stroke-dasharray="4 3" stroke-opacity="0.4" />
          <circle cx="80" cy="42" r="14" fill="#EFF6FF" />
          <!-- 上传云 icon -->
          <path d="M74 44 h12 M80 38 v10 M77 41 L80 38 L83 41" fill="none" stroke="#1A2C54" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <text x="80" y="74" font-size="11" font-weight="bold" fill="#1A2C54" text-anchor="middle">上传商品主图</text>
          <text x="80" y="88" font-size="9" fill="#94a3b8" text-anchor="middle">800x800 · 2MB内</text>

          <!-- 右：描述信息 -->
          <text x="184" y="15" font-size="12" font-weight="bold" fill="#64748b">商品详细描述 (选填)</text>
          <rect x="184" y="24" width="452" height="86" rx="10" fill="#ffffff" stroke="#e2e8f0" />
          <text x="200" y="44" font-size="12" fill="#cbd5e1">请在此处输入商品详情、规格备注、售后说明等...</text>
        </g>
      </g>

      <!-- Section 4: 运营属性 -->
      <g transform="translate(32, 680)">
        <!-- 浅蓝色圆角底色分割区 -->
        <rect x="-12" y="-12" width="660" height="60" rx="12" fill="#f4f8fc" />
        
        <!-- 排序 -->
        <g transform="translate(12, 0)">
          <text x="0" y="24" font-size="12" font-weight="bold" fill="#475569">展示排序</text>
          <rect x="64" y="10" width="80" height="28" rx="6" fill="#ffffff" stroke="#cbd5e1" />
          <text x="76" y="28" font-size="13" fill="#1A2C54" font-weight="bold">1</text>
        </g>

        <!-- 服务费率 -->
        <g transform="translate(180, 0)">
          <text x="0" y="24" font-size="12" font-weight="bold" fill="#475569">服务费率</text>
          <rect x="64" y="10" width="80" height="28" rx="6" fill="#ffffff" stroke="#cbd5e1" />
          <text x="76" y="28" font-size="13" fill="#1A2C54" font-weight="bold">0 %</text>
        </g>

        <!-- 上架开关 (高亮为品牌深蓝色) -->
        <g transform="translate(420, 0)">
          <text x="0" y="24" font-size="12" font-weight="bold" fill="#475569">创建后直接上架销售</text>
          <rect x="144" y="13" width="44" height="20" rx="10" fill="#1A2C54" />
          <circle cx="174" cy="23" r="7" fill="#ffffff" />
        </g>
      </g>

    </g>

    <!-- ==================== 底部胶囊按钮 ==================== -->
    <g transform="translate(0, 875)">
      <!-- 取消 -->
      <rect x="220" y="0" width="110" height="40" rx="20" fill="#f1f5f9" />
      <text x="275" y="24" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle" style="cursor: pointer;">取消返回</text>

      <!-- 保存并发布 -->
      <rect x="350" y="0" width="130" height="40" rx="20" fill="url(#btn-gradient)" />
      <text x="415" y="24" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" style="cursor: pointer;">保存并发布</text>
    </g>

  </g>

</svg>