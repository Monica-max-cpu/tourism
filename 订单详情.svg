<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="100%" height="100%" style="background-color: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  
  <!-- ================= BACKGROUND & SHADOWS ================= -->
  <defs>
    <filter id="card-shadow" x="-2%" y="-5%" width="104%" height="112%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.04" />
    </filter>
  </defs>

  <!-- ================= LEFT SIDEBAR (导航栏) ================= -->
  <rect x="0" y="0" width="220" height="780" fill="#ffffff" stroke-right="#e2e8f0" stroke-width="1" />
  
  <!-- Logo -->
  <g transform="translate(24, 28)">
    <rect x="0" y="0" width="32" height="32" rx="6" fill="#1A2C54" />
    <path d="M10 10 H22 V14 H10 Z M12 18 H20 V22 H12 Z" fill="#ffffff" />
    <text x="42" y="15" font-size="15" font-weight="bold" fill="#1e293b">山西文旅平台</text>
    <text x="42" y="27" font-size="9" fill="#94a3b8" letter-spacing="1">CULTURAL TOURISM SAAS</text>
  </g>

  <!-- Sidebar Menu Items -->
  <g transform="translate(0, 90)">
    <!-- Menu 1 -->
    <g transform="translate(0, 0)">
      <text x="54" y="24" font-size="13" fill="#64748b">门店工作台</text>
      <rect x="24" y="10" width="16" height="16" rx="3" fill="none" stroke="#94a3b8" stroke-width="1.8" />
    </g>
    <!-- Menu 2 -->
    <g transform="translate(0, 40)">
      <text x="54" y="24" font-size="13" fill="#64748b">商品采购</text>
      <rect x="24" y="10" width="16" height="16" rx="3" fill="none" stroke="#94a3b8" stroke-width="1.8" />
    </g>
    <!-- Menu 3 -->
    <g transform="translate(0, 80)">
      <text x="54" y="24" font-size="13" fill="#64748b">购物车</text>
      <rect x="24" y="10" width="16" height="16" rx="3" fill="none" stroke="#94a3b8" stroke-width="1.8" />
    </g>
    <!-- Menu 4 (Active: 我的采购订单) -->
    <g transform="translate(0, 120)">
      <!-- Active background highlight -->
      <rect x="0" y="0" width="220" height="40" fill="#f1f5f9" />
      <rect x="0" y="0" width="4" height="40" fill="#1A2C54" />
      <text x="54" y="24" font-size="13" font-weight="bold" fill="#1A2C54">我的采购订单</text>
      <rect x="24" y="10" width="16" height="16" rx="3" fill="none" stroke="#1A2C54" stroke-width="1.8" />
    </g>
    <!-- Menu 5 -->
    <g transform="translate(0, 160)">
      <text x="54" y="24" font-size="13" fill="#64748b">我的付款记录</text>
      <rect x="24" y="10" width="16" height="16" rx="3" fill="none" stroke="#94a3b8" stroke-width="1.8" />
    </g>
    <!-- Menu 6 -->
    <g transform="translate(0, 200)">
      <text x="54" y="24" font-size="13" fill="#64748b">门店资料</text>
      <rect x="24" y="10" width="16" height="16" rx="3" fill="none" stroke="#94a3b8" stroke-width="1.8" />
    </g>
  </g>

  <!-- ================= TOP BAR (顶部栏) ================= -->
  <rect x="220" y="0" width="980" height="60" fill="#ffffff" />
  <line x1="220" y1="60" x2="1200" y2="60" stroke="#e2e8f0" stroke-width="1" />
  
  <!-- Right profile info -->
  <g transform="translate(1000, 15)">
    <!-- Notification -->
    <path d="M12 4 V6 M6 18 H18 M8 18 V11 A4 4 0 0 1 16 11 V18" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
    <circle cx="16" cy="9" r="3" fill="#ef4444" />
    <!-- Shop Info -->
    <rect x="40" y="0" width="80" height="30" rx="15" fill="#f1f5f9" />
    <text x="54" y="19" font-size="12" fill="#334155" font-weight="500">示例门店</text>
    <!-- Exit -->
    <text x="140" y="19" font-size="12" fill="#94a3b8">退出</text>
  </g>

  <!-- ================= MAIN CONTENT AREA ================= -->

  <!-- Page Header (Breadcrumbs & Title) -->
  <g transform="translate(245, 85)">
    <!-- Breadcrumb -->
    <text x="0" y="12" font-size="12" fill="#94a3b8">采购管理  /  我的采购订单  /  订单详情</text>
    
    <!-- Title & Status Tag -->
    <text x="0" y="42" font-size="20" font-weight="bold" fill="#1e293b">订单号：B2B20260527000001</text>
    <text x="355" y="40" font-size="13" fill="#64748b">下单时间：2026-05-27 14:30:22</text>
    
    <!-- Status Tag 'Pending Payment' -->
    <rect x="580" y="21" width="68" height="26" rx="13" fill="#fef3c7" />
    <text x="596" y="38" font-size="12" font-weight="bold" fill="#d97706">待支付</text>
  </g>

  <!-- ================= LEFT COLUMN (Width: 620) ================= -->
  
  <!-- 1. Progress Stepper Card -->
  <g transform="translate(245, 155)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="620" height="100" rx="8" fill="#ffffff" />
    
    <!-- Line Connectors -->
    <line x1="105" y1="42" x2="515" y2="42" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round" />
    <!-- Active Line -->
    <line x1="105" y1="42" x2="210" y2="42" stroke="#1A2C54" stroke-width="4" stroke-linecap="round" />
    
    <!-- Step 1: Submited (Done) -->
    <g transform="translate(105, 42)">
      <circle cx="0" cy="0" r="14" fill="#1A2C54" />
      <path d="M-5 -1 L-2 2 L5 -4" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
      <text x="0" y="32" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">提交订单</text>
    </g>
    
    <!-- Step 2: Pay pending (Active) -->
    <g transform="translate(207, 42)">
      <circle cx="0" cy="0" r="14" fill="#ffffff" stroke="#1A2C54" stroke-width="4" />
      <circle cx="0" cy="0" r="6" fill="#1A2C54" />
      <text x="0" y="32" font-size="12" font-weight="bold" fill="#1A2C54" text-anchor="middle">支付待审</text>
      <text x="0" y="46" font-size="10" fill="#94a3b8" text-anchor="middle">正在审核凭证</text>
    </g>

    <!-- Step 3: Pending Delivery -->
    <g transform="translate(310, 42)">
      <circle cx="0" cy="0" r="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <text x="0" y="4" font-size="11" fill="#64748b" text-anchor="middle" font-weight="bold">3</text>
      <text x="0" y="32" font-size="12" fill="#64748b" text-anchor="middle">待发货</text>
    </g>

    <!-- Step 4: Shipped -->
    <g transform="translate(412, 42)">
      <circle cx="0" cy="0" r="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <text x="0" y="4" font-size="11" fill="#64748b" text-anchor="middle" font-weight="bold">4</text>
      <text x="0" y="32" font-size="12" fill="#64748b" text-anchor="middle">待收货</text>
    </g>

    <!-- Step 5: Completed -->
    <g transform="translate(515, 42)">
      <circle cx="0" cy="0" r="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <text x="0" y="4" font-size="11" fill="#64748b" text-anchor="middle" font-weight="bold">5</text>
      <text x="0" y="32" font-size="12" fill="#64748b" text-anchor="middle">完成</text>
    </g>
  </g>

  <!-- 2. Product Details Card -->
  <g transform="translate(245, 275)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="620" height="250" rx="8" fill="#ffffff" />
    
    <!-- Card Header -->
    <text x="24" y="32" font-size="14" font-weight="bold" fill="#1e293b">商品明细</text>
    <line x1="24" y1="48" x2="596" y2="48" stroke="#f1f5f9" stroke-width="1.5" />
    
    <!-- Table Columns Header -->
    <text x="24" y="74" font-size="12" fill="#94a3b8">商品名称 / 规格</text>
    <text x="340" y="74" font-size="12" fill="#94a3b8" text-anchor="end">原价/折扣价</text>
    <text x="440" y="74" font-size="12" fill="#94a3b8" text-anchor="end">数量</text>
    <text x="596" y="74" font-size="12" fill="#94a3b8" text-anchor="end">商品小计</text>
    
    <!-- Table Row 1 -->
    <g transform="translate(0, 90)">
      <!-- Thumbnail Placeholder -->
      <rect x="24" y="10" width="48" height="48" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
      <!-- Soft drink bottle icon representation -->
      <path d="M44 20 h8 v4 h-8 z M42 24 h12 v26 h-12 z" fill="#e2e8f0" />
      
      <!-- Product Details -->
      <text x="84" y="26" font-size="14" font-weight="bold" fill="#1e293b">小雪碧 (24瓶/箱)</text>
      <text x="84" y="46" font-size="12" fill="#64748b">SKU: 2059519619936317442</text>
      
      <!-- Price Info -->
      <text x="340" y="30" font-size="12" fill="#94a3b8" text-decoration="line-through" text-anchor="end">¥26.00</text>
      <text x="340" y="48" font-size="13" font-weight="bold" fill="#475569" text-anchor="end">¥25.00</text>
      
      <!-- Quantity -->
      <text x="440" y="36" font-size="13" fill="#1e293b" text-anchor="end">21 箱</text>
      
      <!-- Total -->
      <text x="596" y="36" font-size="14" font-weight="bold" fill="#1A2C54" text-anchor="end">¥525.00</text>
    </g>
    
    <line x1="24" y1="172" x2="596" y2="172" stroke="#f1f5f9" stroke-width="1.5" />
    
    <!-- Summary Info -->
    <text x="596" y="212" font-size="13" fill="#64748b" text-anchor="end">共 1 件商品     商品总额：<tspan font-size="16" font-weight="bold" fill="#1A2C54">¥525.00</tspan></text>
  </g>

  <!-- 3. Delivery & Shipping Info Card -->
  <g transform="translate(245, 545)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="620" height="205" rx="8" fill="#ffffff" />
    
    <!-- Card Header -->
    <text x="24" y="32" font-size="14" font-weight="bold" fill="#1e293b">收货及物流信息</text>
    <line x1="24" y1="48" x2="596" y2="48" stroke="#f1f5f9" stroke-width="1.5" />
    
    <!-- Two Column Layout within Card -->
    <!-- Column A: Shipping Address -->
    <g transform="translate(24, 65)">
      <circle cx="16" cy="16" r="16" fill="#eff6ff" />
      <path d="M16 8 C12.5 8 10 10.5 10 14 C10 18.5 16 24 16 24 C16 24 22 18.5 22 14 C22 10.5 19.5 8 16 8 Z" fill="none" stroke="#1A2C54" stroke-width="1.5" />
      <circle cx="16" cy="13" r="2" fill="#1A2C54" />
      
      <text x="44" y="15" font-size="13" font-weight="bold" fill="#1e293b">收货信息</text>
      <text x="44" y="36" font-size="12" fill="#475569">收货人： 示例门店管理人员  (138****8888)</text>
      <text x="44" y="54" font-size="12" fill="#64748b">地址： 山西省太原市小店区迎泽大街平阳路口首府大厦4层</text>
    </g>

    <line x1="24" y1="145" x2="596" y2="145" stroke="#f8fafc" stroke-width="1.5" />

    <!-- Column B: Logistics/Remark Status -->
    <g transform="translate(24, 162)">
      <!-- Remark -->
      <text x="0" y="18" font-size="12" fill="#64748b">订单备注： <tspan fill="#1e293b">暂无备注要求</tspan></text>
      <!-- Delivery Status Badge -->
      <rect x="495" y="2" width="75" height="24" rx="4" fill="#f1f5f9" />
      <text x="532" y="18" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">未发货</text>
    </g>
  </g>

  <!-- ================= RIGHT COLUMN (Width: 290) ================= -->
  
  <!-- 1. Action Panel Card (Payment Actions) -->
  <g transform="translate(885, 155)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="290" height="230" rx="8" fill="#ffffff" />
    
    <!-- Label -->
    <text x="24" y="36" font-size="13" fill="#64748b">应付总金额</text>
    <!-- Price -->
    <text x="24" y="72" font-size="32" font-weight="black" fill="#1A2C54">¥525.00</text>
    
    <!-- Divider -->
    <line x1="24" y1="95" x2="266" y2="95" stroke="#f1f5f9" stroke-width="1.5" />
    
    <!-- Button: Primary (立即支付) -->
    <g transform="translate(24, 115)">
      <rect x="0" y="0" width="242" height="42" rx="6" fill="#1A2C54" />
      <text x="121" y="26" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">立即支付</text>
    </g>
    
    <!-- Button: Secondary (取消订单) -->
    <g transform="translate(24, 172)">
      <rect x="0" y="0" width="242" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <text x="121" y="24" font-size="13" font-weight="500" fill="#64748b" text-anchor="middle">取消订单</text>
    </g>
  </g>

  <!-- 2. Payment Records Card -->
  <g transform="translate(885, 405)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="290" height="150" rx="8" fill="#ffffff" />
    
    <!-- Title -->
    <text x="24" y="32" font-size="14" font-weight="bold" fill="#1e293b">付款记录</text>
    <line x1="24" y1="46" x2="266" y2="46" stroke="#f1f5f9" stroke-width="1.5" />
    
    <!-- Record Empty/Info details -->
    <g transform="translate(24, 65)">
      <text x="0" y="15" font-size="12" fill="#64748b">支付方式：<tspan fill="#334155">未支付</tspan></text>
      <text x="0" y="38" font-size="12" fill="#64748b">提交时间：<tspan fill="#94a3b8">-</tspan></text>
    </g>
    
    <!-- Alert box: Pending Action -->
    <rect x="24" y="115" width="242" height="20" rx="3" fill="#f8fafc" />
    <circle cx="34" cy="125" r="4" fill="#d97706" />
    <text x="44" y="129" font-size="10" fill="#b45309">等待线下支付凭证上传</text>
  </g>

</svg>